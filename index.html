<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸿渚资源分享站 | 网页·软件·文件·文章一站式分享</title>
    <meta name="description" content="基于Markdown的静态资源分享站，支持网页推荐、软件下载、文件分享和技术文章。">
    <meta name="keywords" content="资源分享,网页推荐,软件下载,技术文章,Markdown">
    <meta name="author" content="鸿渚">
    
    <!-- 样式和脚本库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.7.0/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    
    <style>
        /* ===== CSS 变量定义 ===== */
        :root {
            --color-web: #3b82f6;
            --color-software: #8b5cf6;
            --color-file: #10b981;
            --color-article: #f59e0b;
            --primary-color: #2563eb;
            --secondary-color: #475569;
            --accent-color: #f59e0b;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --bg-light: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --card-shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.15);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark-mode {
            --bg-light: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
            line-height: 1.6;
            transition: var(--transition);
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header {
            background: linear-gradient(135deg, var(--primary-color), #1d4ed8);
            color: white;
            padding: 2.5rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .site-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .site-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 600px;
        }
        .header-actions {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
        }
        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.2rem;
        }
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(15deg);
        }
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2.5rem 0;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 1.8rem;
            text-align: center;
            border: 2px solid var(--border-color);
            transition: var(--transition);
            box-shadow: var(--card-shadow);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow-hover);
        }
        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .stat-label {
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-web .stat-icon { color: var(--color-web); }
        .stat-software .stat-icon { color: var(--color-software); }
        .stat-file .stat-icon { color: var(--color-file); }
        .stat-article .stat-icon { color: var(--color-article); }
        .category-filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 2rem 0;
            padding: 1.5rem;
            background: var(--bg-card);
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }
        .filter-btn {
            padding: 0.7rem 1.8rem;
            border: 2px solid var(--border-color);
            background: transparent;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .filter-btn.active {
            color: white;
            border-color: transparent;
        }
        .filter-all.active { background: linear-gradient(135deg, #667eea, #764ba2); }
        .filter-web.active { background: var(--color-web); }
        .filter-software.active { background: var(--color-software); }
        .filter-file.active { background: var(--color-file); }
        .filter-article.active { background: var(--color-article); }
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }
        .resource-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .resource-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--primary-color);
        }
        .card-header {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
        }
        .card-type-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            color: white;
            z-index: 2;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.7);
        }
        .card-type-web { background: var(--color-web); }
        .card-type-software { background: var(--color-software); }
        .card-type-file { background: var(--color-file); }
        .card-type-article { background: var(--color-article); }
        .card-icon {
            font-size: 3.5rem;
            color: white;
            z-index: 1;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        .card-tags {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 0.5rem;
            z-index: 2;
        }
        .card-tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }
        .tag-hot { background: rgba(239, 68, 68, 0.8); color: white; }
        .tag-new { background: rgba(16, 185, 129, 0.8); color: white; }
        .tag-rec { background: rgba(245, 158, 11, 0.8); color: white; }
        .card-body {
            padding: 1.8rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            line-height: 1.3;
        }
        .card-desc {
            color: var(--text-secondary);
            flex-grow: 1;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.2rem;
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .card-price {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 1.1rem;
        }
        .card-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.8rem;
        }
        .card-action-btn {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
        }
        .card-action-btn.primary {
            background: var(--primary-color);
            color: white;
        }
        .card-action-btn.secondary {
            background: var(--bg-light);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .card-action-btn:hover {
            transform: translateY(-2px);
        }
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }
        .loading-spinner {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: var(--border-color);
        }
        .error-state {
            text-align: center;
            padding: 4rem;
            color: var(--danger-color);
        }
        .error-state i {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        footer {
            text-align: center;
            padding: 3rem 0;
            margin-top: 4rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
        }
        @media (max-width: 768px) {
            .resources-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .site-title {
                font-size: 2rem;
            }
            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
            }
            .category-filters {
                justify-content: center;
            }
            .header-actions {
                position: static;
                margin-top: 1rem;
                justify-content: flex-end;
            }
        }
        @media (max-width: 480px) {
            .stats-panel {
                grid-template-columns: 1fr;
            }
            .filter-btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }
        }
        .hidden { display: none !important; }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-light);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="site-title">
                <i class="fas fa-cube"></i>
                鸿渚资源分享站
            </h1>
            <p class="site-subtitle">
                基于Markdown的静态资源分享站 · 支持网页推荐、软件下载、文件分享、技术文章
            </p>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="stats-panel">
            <div class="stat-card stat-web">
                <i class="fas fa-globe stat-icon"></i>
                <div class="stat-value" id="statWeb">0</div>
                <div class="stat-label">网页分享</div>
            </div>
            <div class="stat-card stat-software">
                <i class="fas fa-download stat-icon"></i>
                <div class="stat-value" id="statSoftware">0</div>
                <div class="stat-label">软件分享</div>
            </div>
            <div class="stat-card stat-file">
                <i class="fas fa-file-archive stat-icon"></i>
                <div class="stat-value" id="statFile">0</div>
                <div class="stat-label">文件分享</div>
            </div>
            <div class="stat-card stat-article">
                <i class="fas fa-book-open stat-icon"></i>
                <div class="stat-value" id="statArticle">0</div>
                <div class="stat-label">文章分享</div>
            </div>
        </div>

        <div class="category-filters" id="categoryFilters">
            <button class="filter-btn filter-all active" data-category="all">
                <i class="fas fa-th-large"></i> 全部资源
            </button>
            <button class="filter-btn filter-web" data-category="web">
                <i class="fas fa-globe"></i> 网页分享
            </button>
            <button class="filter-btn filter-software" data-category="software">
                <i class="fas fa-download"></i> 软件分享
            </button>
            <button class="filter-btn filter-file" data-category="file">
                <i class="fas fa-file-archive"></i> 文件分享
            </button>
            <button class="filter-btn filter-article" data-category="article">
                <i class="fas fa-book-open"></i> 文章分享
            </button>
        </div>

        <div id="resourcesContainer">
            <div class="loading">
                <i class="fas fa-spinner fa-spin loading-spinner"></i>
                <h3>正在从GitHub加载资源数据...</h3>
                <p>首次加载可能需要几秒钟时间</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2025-2026 鸿渚资源分享站 | 基于Markdown + GitHub Pages构建</p>
            <p style="margin-top: 0.5rem; font-size: 0.9rem;">
                版本 1.0 | 四种资源类型 | 最后更新: <span id="currentDate">2026-02-03</span>
            </p>
        </div>
    </footer>

    <script>
        // ============================================================================
        // 配置与状态
        // ============================================================================
        const CONFIG = {
            dataIndexUrl: 'data-index.json',
            cacheBuster: '?v=' + new Date().getTime(),
            verifyApiUrl: 'https://your-project.vercel.app/api/verify-redeem' // 替换为你的云函数地址
        };

        const AppState = {
            allResources: [],
            filteredResources: [],
            currentCategory: 'all',
            isDarkMode: localStorage.getItem('darkMode') === 'true',
            loadedFiles: new Map(),
            unlockedResources: new Set(JSON.parse(localStorage.getItem('unlockedResources') || '[]'))
        };

        // ============================================================================
        // 防复制保护
        // ============================================================================
        function enableCopyProtection() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.ctrlKey && ['c', 'a', 's', 'u'].includes(e.key.toLowerCase())) e.preventDefault();
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(e.key.toLowerCase()))) e.preventDefault();
                if (e.altKey && ['d', 'e'].includes(e.key.toLowerCase())) e.preventDefault();
            });
            document.addEventListener('copy', e => e.preventDefault());
            document.addEventListener('cut', e => e.preventDefault());
            document.addEventListener('paste', e => e.preventDefault());
        }

        // ============================================================================
        // 主应用
        // ============================================================================
        class ResourceShareApp {
            constructor() {
                this.init();
            }

            async init() {
                try {
                    this.setCurrentDate();
                    this.initTheme();
                    this.bindEvents();
                    await this.loadDataIndex();
                    await this.loadAllResources();
                    this.renderResources();
                    this.updateStatistics();
                    console.log('✅ 应用初始化完成，加载资源数:', AppState.allResources.length);
                } catch (error) {
                    console.error('❌ 应用初始化失败:', error);
                    this.showError('无法加载资源数据，请检查控制台或网络连接。');
                }
            }

            setCurrentDate() {
                const now = new Date();
                const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
                document.getElementById('currentDate').textContent = dateStr;
            }

            initTheme() {
                if (AppState.isDarkMode) {
                    document.body.classList.add('dark-mode');
                    document.querySelector('#themeToggle i').className = 'fas fa-sun';
                }
            }

            bindEvents() {
                document.getElementById('themeToggle').addEventListener('click', () => this.toggleTheme());
                document.getElementById('categoryFilters').addEventListener('click', (e) => {
                    const filterBtn = e.target.closest('.filter-btn');
                    if (filterBtn) {
                        const category = filterBtn.dataset.category;
                        this.setActiveCategory(category);
                    }
                });
            }

            toggleTheme() {
                AppState.isDarkMode = !AppState.isDarkMode;
                document.body.classList.toggle('dark-mode', AppState.isDarkMode);
                localStorage.setItem('darkMode', AppState.isDarkMode);
                const icon = document.querySelector('#themeToggle i');
                icon.className = AppState.isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
                this.showNotification(AppState.isDarkMode ? '已切换到深色模式' : '已切换到浅色模式', 'info');
            }

            async loadDataIndex() {
                const response = await fetch(CONFIG.dataIndexUrl + CONFIG.cacheBuster);
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${CONFIG.dataIndexUrl}`);
                this.dataIndex = await response.json();
                console.log('📁 数据索引加载成功:', this.dataIndex);
            }

            async loadAllResources() {
                if (!this.dataIndex?.cards) throw new Error('索引文件中未找到卡片数据');
                AppState.allResources = [];
                const loadPromises = this.dataIndex.cards.map(async (cardPath) => {
                    try {
                        if (AppState.loadedFiles.has(cardPath)) return AppState.loadedFiles.get(cardPath);
                        const resource = await this.loadMarkdownFile(cardPath);
                        AppState.loadedFiles.set(cardPath, resource);
                        return resource;
                    } catch (error) {
                        console.warn(`⚠️ 卡片加载失败 ${cardPath}:`, error);
                        return null;
                    }
                });
                const results = await Promise.all(loadPromises);
                AppState.allResources = results.filter(r => r !== null && !r.meta._error);
                AppState.filteredResources = [...AppState.allResources];
                console.log(`✅ 成功加载 ${AppState.allResources.length} 张卡片`);
            }

            async loadMarkdownFile(filePath) {
                const response = await fetch(filePath + CONFIG.cacheBuster);
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${filePath}`);
                const text = await response.text();
                const parsed = this.parseFrontMatter(text);
                if (!parsed.meta.id && !parsed.meta.title) {
                    console.warn(`文件 ${filePath} 缺少必要的元数据`);
                    parsed.meta._error = true;
                }
                parsed.meta._sourcePath = filePath;
                return parsed;
            }

            parseFrontMatter(content) {
                content = content.trim();
                if (!content.startsWith('---')) {
                    return { meta: { title: '未命名资源', description: content.slice(0, 150) + '...', type: 'web', category: '未分类' }, content };
                }
                const lines = content.split('\n');
                let i = 1;
                const meta = {};
                const yamlLines = [];
                while (i < lines.length && lines[i].trim() !== '---') {
                    yamlLines.push(lines[i]);
                    i++;
                }
                yamlLines.forEach(line => {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed.startsWith('#')) return;
                    const colonIndex = trimmed.indexOf(':');
                    if (colonIndex > -1) {
                        const key = trimmed.slice(0, colonIndex).trim();
                        let value = trimmed.slice(colonIndex + 1).trim();
                        if (value.startsWith('[') && value.endsWith(']')) {
                            try {
                                value = value.slice(1, -1).split(',').map(v => v.trim().replace(/^['"]|['"]$/g, ''));
                            } catch { value = []; }
                        } else if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) {
                            value = value.slice(1, -1);
                        } else if (value.toLowerCase() === 'true') value = true;
                        else if (value.toLowerCase() === 'false') value = false;
                        else if (/^-?\d+(\.\d+)?$/.test(value)) value = Number(value);
                        meta[key] = value;
                    }
                });
                const mainContent = lines.slice(i + 1).join('\n').trim();
                if (!meta.type) meta.type = 'web';
                if (!meta.category) meta.category = '未分类';
                if (!meta.icon) meta.icon = this.getDefaultIcon(meta.type);
                if (!meta.date) meta.date = new Date().toISOString().split('T')[0];
                return { meta, content: mainContent };
            }

            renderResources() {
                const container = document.getElementById('resourcesContainer');
                const resources = AppState.filteredResources;
                if (resources.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><h3>未找到匹配的资源</h3><p>尝试选择其他分类或稍后再试。</p></div>`;
                    return;
                }
                container.innerHTML = resources.map((resource, index) => {
                    const meta = resource.meta;
                    const type = meta.type || 'web';
                    const typeText = this.getTypeChineseName(type);
                    const typeClass = `card-type-${type}`;
                    let tagsHtml = '';
                    if (meta.tags && Array.isArray(meta.tags)) {
                        tagsHtml = meta.tags.map(tag => {
                            let tagClass = 'card-tag';
                            if (tag === '热门') tagClass += ' tag-hot';
                            else if (tag === '最新') tagClass += ' tag-new';
                            else if (tag === '推荐') tagClass += ' tag-rec';
                            return `<span class="${tagClass}">${tag}</span>`;
                        }).join('');
                    }
                    let actionHtml = '';
                    if (meta.is_paid) {
                        actionHtml = `<button class="card-action-btn primary" data-index="${index}" data-type="paid"><i class="fas fa-lock"></i>付费内容 (¥${meta.price || '?'})</button>`;
                    } else {
                        let actionText = '', actionIcon = '';
                        switch(type) {
                            case 'article': actionText = '阅读文章'; actionIcon = 'book-open'; break;
                            case 'file': actionText = '查看详情'; actionIcon = 'download'; break;
                            case 'web': case 'software': actionText = '访问链接'; actionIcon = 'external-link-alt'; break;
                        }
                        actionHtml = `<button class="card-action-btn primary" data-index="${index}" data-type="${type}"><i class="fas fa-${actionIcon}"></i>${actionText}</button>`;
                    }
                    return `
                    <div class="resource-card" data-index="${index}">
                        <div class="card-header" ${meta.cover ? `style="background-image: url('${meta.cover}')"` : ''}>
                            <div class="card-type-badge ${typeClass}">${typeText}</div>
                            ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
                            <i class="${meta.icon} card-icon"></i>
                        </div>
                        <div class="card-body">
                            <h3 class="card-title">${this.escapeHtml(meta.title)}</h3>
                            <p class="card-desc">${this.escapeHtml(meta.description || '暂无描述')}</p>
                            <div class="card-meta"><span>${this.escapeHtml(meta.category)}</span><span>${meta.date || ''}</span></div>
                            ${actionHtml}
                        </div>
                    </div>`;
                }).join('');
                this.bindCardEvents();
            }

            bindCardEvents() {
                const container = document.getElementById('resourcesContainer');
                container.addEventListener('click', (e) => {
                    const card = e.target.closest('.resource-card');
                    const actionBtn = e.target.closest('.card-action-btn');
                    if (card && actionBtn) {
                        e.preventDefault();
                        e.stopPropagation();
                        const index = parseInt(card.dataset.index);
                        const type = actionBtn.dataset.type;
                        this.handleCardAction(index, type);
                    } else if (card && !e.target.closest('.paypal-button-container')) {
                        const index = parseInt(card.dataset.index);
                        const resource = AppState.filteredResources[index];
                        if (resource && !resource.meta.is_paid) {
                            this.handleCardAction(index, resource.meta.type);
                        }
                    }
                });
            }

            handleCardAction(index, type) {
                const resource = AppState.filteredResources[index];
                if (!resource) return;
                const meta = resource.meta;

                if (meta.is_paid) {
                    // 付费资源：跳转到详情页，由详情页处理兑换
                    if (meta.resource_id) {
                        window.location.href = `detail.html?id=${encodeURIComponent(meta.resource_id)}`;
                    } else {
                        this.showNotification('该付费资源缺少 resource_id', 'error');
                    }
                    return;
                }

                // 非付费资源
                switch(type) {
                    case 'article':
                        if (meta.contentRef) {
                            // 跳转到详情页
                            window.location.href = `detail.html?id=${encodeURIComponent(meta.resource_id || meta.id)}`;
                        } else {
                            this.showNotification('该文章暂无内容', 'warning');
                        }
                        break;
                    case 'file':
                        if (meta.fileRef) {
                            window.location.href = `detail.html?id=${encodeURIComponent(meta.resource_id || meta.id)}`;
                        } else if (meta.url) {
                            window.open(meta.url, '_blank');
                        }
                        break;
                    case 'web':
                    case 'software':
                        if (meta.url) {
                            window.open(meta.url, '_blank');
                            this.showNotification(`正在访问: ${meta.title}`, 'info');
                        }
                        break;
                }
            }

            setActiveCategory(category) {
                AppState.currentCategory = category;
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.category === category);
                });
                if (category === 'all') {
                    AppState.filteredResources = [...AppState.allResources];
                } else {
                    AppState.filteredResources = AppState.allResources.filter(r => r.meta.type === category);
                }
                this.renderResources();
                this.updateStatistics();
                console.log(`📊 切换到分类: ${category}, 显示 ${AppState.filteredResources.length} 个资源`);
            }

            updateStatistics() {
                const resources = AppState.allResources;
                let webCount = 0, softwareCount = 0, fileCount = 0, articleCount = 0;
                resources.forEach(r => {
                    switch(r.meta.type) {
                        case 'web': webCount++; break;
                        case 'software': softwareCount++; break;
                        case 'file': fileCount++; break;
                        case 'article': articleCount++; break;
                    }
                });
                document.getElementById('statWeb').textContent = webCount;
                document.getElementById('statSoftware').textContent = softwareCount;
                document.getElementById('statFile').textContent = fileCount;
                document.getElementById('statArticle').textContent = articleCount;
                console.log('📈 统计更新:', { webCount, softwareCount, fileCount, articleCount, total: resources.length });
            }

            showError(message) {
                const container = document.getElementById('resourcesContainer');
                container.innerHTML = `<div class="error-state"><i class="fas fa-exclamation-triangle"></i><h3>加载失败</h3><p>${this.escapeHtml(message)}</p><button onclick="location.reload()" style="margin-top:1.5rem; padding:0.8rem 2rem; background:var(--primary-color); color:white; border:none; border-radius:8px; cursor:pointer;"><i class="fas fa-redo"></i> 重新加载</button></div>`;
            }

            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.style.cssText = `position:fixed; top:20px; right:20px; background:${type === 'info' ? '#3b82f6' : type === 'success' ? '#10b981' : '#ef4444'}; color:white; padding:1rem 1.5rem; border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,0.2); z-index:9999; animation:slideIn 0.3s ease; max-width:300px; display:flex; align-items:center; gap:10px;`;
                const icon = type === 'info' ? 'info-circle' : type === 'success' ? 'check-circle' : 'exclamation-circle';
                notification.innerHTML = `<i class="fas fa-${icon}"></i><span>${this.escapeHtml(message)}</span>`;
                document.body.appendChild(notification);
                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease';
                    setTimeout(() => notification.parentNode?.removeChild(notification), 300);
                }, 3000);
            }

            getTypeChineseName(type) {
                const map = { 'web': '网页分享', 'software': '软件分享', 'file': '文件分享', 'article': '文章分享' };
                return map[type] || type;
            }
            getDefaultIcon(type) {
                const map = { 'web': 'fas fa-globe', 'software': 'fas fa-download', 'file': 'fas fa-file-archive', 'article': 'fas fa-book-open' };
                return map[type] || 'fas fa-star';
            }
            getFileIcon(fileType) {
                if (!fileType) return 'file';
                const map = { 'zip':'file-archive','rar':'file-archive','7z':'file-archive','pdf':'file-pdf','doc':'file-word','docx':'file-word','xls':'file-excel','xlsx':'file-excel','ppt':'file-powerpoint','pptx':'file-powerpoint','jpg':'file-image','jpeg':'file-image','png':'file-image','gif':'file-image','mp4':'file-video','avi':'file-video','mov':'file-video','mp3':'file-audio','wav':'file-audio','txt':'file-alt','md':'file-alt' };
                return map[fileType.toLowerCase()] || 'file';
            }
            escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // ============================================================================
        // 启动
        // ============================================================================
        document.addEventListener('DOMContentLoaded', () => {
            const style = document.createElement('style');
            style.textContent = `@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}`;
            document.head.appendChild(style);
            enableCopyProtection();
            window.app = new ResourceShareApp();
        });
    </script>
</body>
</html>
