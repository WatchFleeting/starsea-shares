<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸿渚资源分享站 | 网页·软件·文件·文章一站式分享</title>
    <meta name="description" content="基于Markdown的静态资源分享站，支持网页推荐、软件下载、文件分享和技术文章。">
    <meta name="keywords" content="资源分享,网页推荐,软件下载,技术文章,Markdown">
    <meta name="author" content="鸿渚">
    
    <!-- 引入外部库：Font Awesome 图标库、marked Markdown解析器、highlight.js 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.7.0/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    
    <style>
        /* ===== CSS 变量 ===== */
        :root {
            --color-web: #3b82f6;
            --color-software: #8b5cf6;
            --color-file: #10b981;
            --color-article: #f59e0b;
            --primary-color: #2563eb;
            --secondary-color: #475569;
            --accent-color: #f59e0b;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --bg-light: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --card-shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.15);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body.dark-mode {
            --bg-light: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
            line-height: 1.6;
            transition: var(--transition);
            min-height: 100vh;
            user-select: none; /* 防复制：禁止选中文本 */
            -webkit-user-select: none;
        }
        
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
        
        /* ===== 头部 ===== */
        header {
            background: linear-gradient(135deg, var(--primary-color), #1d4ed8);
            color: white;
            padding: 2.5rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        
        .site-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-actions {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
        }
        
        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }
        
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(15deg);
        }
        
        /* ===== 搜索和筛选栏 ===== */
        .search-bar {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border: 2px solid var(--border-color);
            border-radius: 40px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .category-filters {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 1rem 0 2rem;
        }
        
        .filter-btn {
            padding: 8px 20px;
            border: 2px solid var(--border-color);
            background: transparent;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-primary);
            transition: var(--transition);
        }
        
        .filter-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .filter-btn.active { color: white; border-color: transparent; }
        .filter-all.active { background: linear-gradient(135deg, #667eea, #764ba2); }
        .filter-web.active { background: var(--color-web); }
        .filter-software.active { background: var(--color-software); }
        .filter-file.active { background: var(--color-file); }
        .filter-article.active { background: var(--color-article); }
        
        /* ===== 统计面板 ===== */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.5rem;
            margin: 2.5rem 0;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            text-align: center;
            border: 2px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }
        
        .stat-icon { font-size: 2.2rem; margin-bottom: 0.8rem; }
        .stat-value { font-size: 2rem; font-weight: 800; }
        .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
        
        /* ===== 卡片网格 ===== */
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }
        
        .resource-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .resource-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--primary-color);
        }
        
        .card-header {
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
        }
        
        .card-type-badge {
            position: absolute;
            top: 15px; right: 15px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            z-index: 2;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.7);
        }
        
        .card-icon {
            font-size: 3rem;
            color: white;
            z-index: 1;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        
        .card-body {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .card-desc {
            color: var(--text-secondary);
            flex-grow: 1;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .card-meta {
            display: flex;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .card-price {
            color: var(--accent-color);
            font-weight: 700;
        }
        
        .card-action-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .card-action-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        
        /* ===== 模态框 ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            padding: 20px;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            width: 100%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transform: translateY(30px);
            transition: transform 0.4s;
        }
        
        .modal-overlay.active .modal { transform: translateY(0); }
        
        .modal-header {
            padding: 1.2rem 1.8rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--primary-color), #1d4ed8);
            color: white;
            border-radius: var(--border-radius) var(--border-radius) 0 0;
        }
        
        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 38px; height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
        }
        
        .modal-close:hover { background: rgba(255,255,255,0.3); transform: rotate(90deg); }
        
        .modal-body {
            padding: 2rem;
            overflow-y: auto;
        }
        
        /* ===== 兑换码区域 ===== */
        .redeem-box {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border: 2px dashed var(--accent-color);
        }
        
        .redeem-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 40px;
            background: var(--bg-card);
            color: var(--text-primary);
            margin: 1rem 0;
        }
        
        .redeem-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .redeem-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245,158,11,0.4); }
        .redeem-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .redeem-result {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 600;
        }
        .redeem-success { background: rgba(16,185,129,0.2); color: var(--success-color); border: 1px solid var(--success-color); }
        .redeem-error { background: rgba(239,68,68,0.2); color: var(--danger-color); border: 1px solid var(--danger-color); }
        
        /* ===== 下载按钮 ===== */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 35px;
            background: linear-gradient(135deg, var(--color-file), #059669);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin: 1rem 0;
            box-shadow: 0 5px 15px rgba(16,185,129,0.3);
        }
        
        /* ===== 加载与空状态 ===== */
        .loading, .empty-state, .error-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }
        .loading i { font-size: 3rem; margin-bottom: 1rem; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        footer {
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
        }
        
        /* ===== 工具类 ===== */
        .hidden { display: none !important; }
        @media (max-width: 600px) { .header-actions { position: static; margin-top: 1rem; } }
    </style>
</head>
<body>
    <!-- 头部区域 -->
    <header>
        <div class="container">
            <h1 class="site-title"><i class="fas fa-cube"></i> 鸿渚资源分享站</h1>
            <p class="site-subtitle">网页·软件·文件·文章 一站式分享</p>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="切换主题"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- 统计面板：动态显示各类资源数量 -->
        <div class="stats-panel" id="statsPanel"></div>

        <!-- 搜索与筛选区域 -->
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索资源名称、描述或标签...">
        </div>
        <div class="category-filters" id="categoryFilters">
            <button class="filter-btn filter-all active" data-category="all">全部</button>
            <button class="filter-btn filter-web" data-category="web">网页</button>
            <button class="filter-btn filter-software" data-category="software">软件</button>
            <button class="filter-btn filter-file" data-category="file">文件</button>
            <button class="filter-btn filter-article" data-category="article">文章</button>
        </div>

        <!-- 加载指示器 -->
        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <h3>正在加载资源...</h3>
        </div>

        <!-- 空状态：无匹配结果时显示 -->
        <div id="noResults" class="empty-state hidden">
            <i class="fas fa-search"></i>
            <h3>未找到匹配的资源</h3>
        </div>

        <!-- 资源卡片网格 -->
        <div class="resources-grid" id="resourcesGrid"></div>
    </main>

    <!-- 详情模态框 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">资源详情</h2>
                <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2025-2026 鸿渚资源分享站 | v2</p>
        </div>
    </footer>

    <script>
        // ==================== 防复制模块 ====================
        // 该自执行函数用于禁用常见的复制操作，保护网站内容。
        (function antiCopy() {
            // 禁用右键菜单
            document.addEventListener('contextmenu', e => e.preventDefault());
            // 禁用常用快捷键：Ctrl+C, Ctrl+A, Ctrl+S, Ctrl+U, F12, Ctrl+Shift+I
            document.addEventListener('keydown', e => {
                const isCtrl = e.ctrlKey || e.metaKey;
                const key = e.key.toLowerCase();
                if (isCtrl && (key === 'c' || key === 'a' || key === 's' || key === 'u')) e.preventDefault();
                if (e.key === 'F12' || (isCtrl && e.shiftKey && key === 'i')) e.preventDefault();
            });
            // 禁用鼠标选择
            document.addEventListener('selectstart', e => e.preventDefault());
            // 禁用复制事件
            document.addEventListener('copy', e => e.preventDefault());
        })();

        // ==================== 全局配置 ====================
        // 所有可配置参数集中在此，方便修改
        const CONFIG = {
            dataIndexUrl: 'data-index.json',                           // 资源索引文件路径
            verifyApiUrl: 'https://your-vercel-app.vercel.app/api/verify-redeem', // 兑换码验证API地址（请替换）
            cacheDuration: 60 * 60 * 1000,                             // 本地缓存有效期 1小时（毫秒）
            searchDebounceMs: 300,                                      // 搜索防抖延迟（毫秒）
        };

        // ==================== 全局状态 ====================
        let allResources = [];                // 从服务器加载的所有原始资源
        let filteredResources = [];           // 经过筛选后的资源列表
        let currentModalResource = null;      // 当前模态框中显示的资源对象
        let searchTimeout = null;              // 搜索防抖定时器ID
        const unlockedResources = new Set();   // 已解锁的付费资源ID集合（用于避免重复验证）

        // DOM 元素引用
        const statsPanel = document.getElementById('statsPanel');
        const resourcesGrid = document.getElementById('resourcesGrid');
        const noResults = document.getElementById('noResults');
        const loading = document.getElementById('loading');
        const categoryFilters = document.getElementById('categoryFilters');
        const searchInput = document.getElementById('searchInput');
        const modalOverlay = document.getElementById('detailModal');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');
        const themeToggle = document.getElementById('themeToggle');

        // ==================== 初始化 ====================
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', init);

        /**
         * 应用初始化入口
         * 1. 绑定事件监听器
         * 2. 加载资源数据（优先使用缓存）
         * 3. 渲染统计面板（基于全部资源）
         * 4. 执行首次筛选（渲染卡片）
         * 5. 隐藏加载指示器
         */
        async function init() {
            setupEventListeners();
            await loadResourcesWithCache();
            renderStats(allResources); // 初始统计基于全部资源
            filterResources();          // 首次渲染
            loading.classList.add('hidden');
        }

        /**
         * 绑定所有事件监听器
         * - 分类筛选按钮点击
         * - 搜索输入（带防抖）
         * - 模态框关闭
         * - 主题切换
         */
        function setupEventListeners() {
            // 分类筛选：点击按钮时切换激活状态并重新筛选
            categoryFilters.addEventListener('click', (e) => {
                const btn = e.target.closest('.filter-btn');
                if (!btn) return;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterResources();
            });

            // 搜索输入：防抖处理，避免频繁筛选
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => filterResources(), CONFIG.searchDebounceMs);
            });

            // 模态框关闭按钮
            modalClose.addEventListener('click', closeModal);
            // 点击模态框背景（遮罩）关闭
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });

            // 主题切换
            themeToggle.addEventListener('click', toggleDarkMode);
            // 恢复深色模式状态（从 localStorage 读取）
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
        }

        /**
         * 切换深色/浅色主题
         * 同时更新 localStorage 中的设置，并更改按钮图标
         */
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', isDark);
            themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        // ==================== 数据加载（带缓存） ====================

        /**
         * 加载资源数据，优先使用 localStorage 缓存
         * 如果缓存存在且未过期，直接使用；否则从网络加载并存入缓存
         */
        async function loadResourcesWithCache() {
            const cacheKey = 'starsea_resources';
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < CONFIG.cacheDuration) {
                        allResources = data;
                        console.log('使用缓存数据');
                        return;
                    }
                } catch (e) { console.warn('缓存解析失败'); }
            }
            // 缓存不存在或已过期，从网络加载
            await loadResourcesFromNetwork();
            // 存入缓存
            localStorage.setItem(cacheKey, JSON.stringify({ data: allResources, timestamp: Date.now() }));
        }

        /**
         * 从网络加载资源数据
         * 1. 获取索引文件 data-index.json
         * 2. 并行获取所有卡片 Markdown 文件
         * 3. 解析每个 Markdown 的 YAML 前置元数据
         * 4. 构造资源对象存入 allResources
         */
        async function loadResourcesFromNetwork() {
            try {
                const indexRes = await fetch(CONFIG.dataIndexUrl);
                if (!indexRes.ok) throw new Error('索引加载失败');
                const index = await indexRes.json();
                const cardPaths = index.cards || [];

                if (cardPaths.length === 0) { allResources = []; return; }

                // 并行获取所有卡片内容
                const contents = await Promise.all(
                    cardPaths.map(file =>
                        fetch(file).then(res => res.ok ? res.text() : null)
                    )
                );

                // 解析每个文件，构造资源对象
                allResources = contents.filter(Boolean).map((text, idx) => {
                    const parsed = parseFrontMatter(text);
                    return {
                        ...parsed.meta,                // 合并 YAML 元数据
                        id: parsed.meta.id || idx,      // 确保有 id
                        content: parsed.content,        // 保留正文内容
                        _sourcePath: cardPaths[idx]     // 源文件路径（用于后续加载详情）
                    };
                }).filter(r => r.title); // 过滤掉没有标题的无效资源
            } catch (error) {
                console.error('加载失败:', error);
                loading.innerHTML = `<div class="error-state"><i class="fas fa-exclamation-triangle"></i><p>加载失败，请刷新</p></div>`;
                allResources = [];
            }
        }

        /**
         * 解析 Markdown 文件的 YAML 前置元数据
         * 简化版，仅处理基本的 key: value 格式，不处理复杂 YAML
         * @param {string} content - 完整的 Markdown 内容
         * @returns {object} { meta: 解析后的元数据对象, content: 正文内容 }
         */
        function parseFrontMatter(content) {
            const lines = content.split('\n');
            // 如果没有以 '---' 开头，则视为无元数据，全部为正文
            if (!lines[0].startsWith('---')) return { meta: {}, content };
            let i = 1;
            const meta = {};
            // 逐行解析，直到遇到结束的 '---'
            while (i < lines.length && !lines[i].startsWith('---')) {
                const [key, ...val] = lines[i].split(':');
                if (key && val.length) meta[key.trim()] = val.join(':').trim();
                i++;
            }
            const mainContent = lines.slice(i + 1).join('\n');
            return { meta, content: mainContent };
        }

        // ==================== 渲染统计 ====================

        /**
         * 渲染统计面板
         * @param {Array} resources - 要统计的资源数组（通常是全部或筛选后的）
         */
        function renderStats(resources) {
            const total = resources.length;
            const counts = { web:0, software:0, file:0, article:0 };
            resources.forEach(r => { if (counts.hasOwnProperty(r.type)) counts[r.type]++; });
            statsPanel.innerHTML = `
                <div class="stat-card"><i class="fas fa-cube stat-icon"></i><div class="stat-value">${total}</div><div class="stat-label">全部</div></div>
                <div class="stat-card"><i class="fas fa-globe stat-icon" style="color:var(--color-web)"></i><div class="stat-value">${counts.web}</div><div class="stat-label">网页</div></div>
                <div class="stat-card"><i class="fas fa-download stat-icon" style="color:var(--color-software)"></i><div class="stat-value">${counts.software}</div><div class="stat-label">软件</div></div>
                <div class="stat-card"><i class="fas fa-file-archive stat-icon" style="color:var(--color-file)"></i><div class="stat-value">${counts.file}</div><div class="stat-label">文件</div></div>
                <div class="stat-card"><i class="fas fa-book-open stat-icon" style="color:var(--color-article)"></i><div class="stat-value">${counts.article}</div><div class="stat-label">文章</div></div>
            `;
        }

        // ==================== 筛选与排序 ====================

        /**
         * 根据当前选中的分类和搜索词对资源进行筛选，并排序
         * 更新 filteredResources 后，重新渲染统计和卡片网格
         */
        function filterResources() {
            const activeCategory = document.querySelector('.filter-btn.active')?.dataset.category || 'all';
            const searchTerm = searchInput.value.trim().toLowerCase();

            filteredResources = allResources.filter(res => {
                // 分类筛选
                if (activeCategory !== 'all' && res.type !== activeCategory) return false;
                // 搜索筛选（匹配标题、描述、标签）
                if (searchTerm) {
                    return (res.title?.toLowerCase().includes(searchTerm) ||
                            res.description?.toLowerCase().includes(searchTerm) ||
                            (res.tags && res.tags.some(t => t.toLowerCase().includes(searchTerm))));
                }
                return true;
            });

            // 简单排序：按 id 升序（可根据需要修改）
            filteredResources.sort((a, b) => (a.id || 0) - (b.id || 0));
            
            // 更新统计面板（基于筛选后的结果）
            renderStats(filteredResources);
            
            // 渲染卡片网格
            renderGrid();
        }

        /**
         * 渲染卡片网格
         * 根据 filteredResources 生成 HTML 并插入到 resourcesGrid 中
         * 如果 filteredResources 为空，显示空状态
         */
        function renderGrid() {
            if (filteredResources.length === 0) {
                resourcesGrid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            resourcesGrid.innerHTML = filteredResources.map((res, idx) => {
                const typeClass = `card-type-${res.type}`;
                const priceDisplay = res.is_paid ? `¥${res.price}` : '免费';
                const icon = res.icon || getDefaultIcon(res.type);
                const desc = (res.description || '').substring(0, 80) + (res.description?.length > 80 ? '...' : '');
                return `
                    <div class="resource-card" data-index="${idx}">
                        <div class="card-header" ${res.cover ? `style="background-image: url('${res.cover}')"` : ''}>
                            <span class="card-type-badge ${typeClass}">${res.type}</span>
                            <i class="${icon} card-icon"></i>
                        </div>
                        <div class="card-body">
                            <h3 class="card-title">${escapeHtml(res.title)}</h3>
                            <p class="card-desc">${escapeHtml(desc)}</p>
                            <div class="card-meta">
                                <span>${escapeHtml(res.category || '其他')}</span>
                                <span class="card-price">${priceDisplay}</span>
                            </div>
                            <button class="card-action-btn" data-index="${idx}">查看详情</button>
                        </div>
                    </div>
                `;
            }).join('');

            // 为每个卡片详情按钮绑定点击事件
            document.querySelectorAll('.card-action-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = btn.dataset.index;
                    openModal(filteredResources[idx]);
                });
            });
        }

        /**
         * 根据资源类型返回默认的 Font Awesome 图标类名
         * @param {string} type - 资源类型（web/software/file/article）
         * @returns {string} 图标类名
         */
        function getDefaultIcon(type) {
            const map = { web:'fas fa-globe', software:'fas fa-download', file:'fas fa-file-archive', article:'fas fa-book-open' };
            return map[type] || 'fas fa-star';
        }

        /**
         * 转义 HTML 特殊字符，防止 XSS 攻击
         * @param {string} text - 原始文本
         * @returns {string} 转义后的安全文本
         */
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 模态框详情 ====================

        /**
         * 打开模态框并加载资源详情
         * @param {object} resource - 要显示的资源对象
         */
        function openModal(resource) {
            currentModalResource = resource;
            document.getElementById('modalTitle').innerHTML = `<i class="fas fa-info-circle"></i> ${escapeHtml(resource.title)}`;
            modalBody.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i></div>';
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // 禁止背景滚动

            // 根据资源类型调用不同的渲染函数
            if (resource.type === 'file') renderFileDetail(resource);
            else if (resource.type === 'article') renderArticleDetail(resource);
            else renderDefaultDetail(resource);
        }

        /** 关闭模态框 */
        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = 'auto'; // 恢复滚动
        }

        /**
         * 渲染文件类型资源的详情
         * 如果资源有 fileRef，会尝试加载对应的详情文件
         * 根据付费状态和是否解锁显示兑换码输入框或下载按钮
         * @param {object} resource - 资源对象（可能来自卡片或已加载的详情）
         */
        async function renderFileDetail(resource) {
            try {
                let fileMeta = resource;
                // 如果有 fileRef 且尚未加载完整详情，则加载对应的 Markdown 文件
                if (resource.fileRef && !resource._fullDetail) {
                    const fileRes = await fetch(resource.fileRef);
                    const text = await fileRes.text();
                    const parsed = parseFrontMatter(text);
                    fileMeta = { ...resource, ...parsed.meta, content: parsed.content, _fullDetail: true };
                }

                const resourceKey = fileMeta.id || fileMeta.fileRef || 'unknown';
                const isUnlocked = unlockedResources.has(resourceKey);
                const isPaid = fileMeta.is_paid;

                let html = `
                    <div class="file-detail" style="text-align:center">
                        <i class="fas fa-${getFileIcon(fileMeta.fileType)}" style="font-size:4rem; color:var(--color-file)"></i>
                        <h2>${escapeHtml(fileMeta.fileName || fileMeta.title)}</h2>
                        <p>${escapeHtml(fileMeta.description || '')}</p>
                        <p><i class="fas fa-weight-hanging"></i> ${fileMeta.fileSize || '大小未知'}</p>
                `;

                // 付费且未解锁 -> 显示兑换码输入框
                if (isPaid && !isUnlocked) {
                    html += `
                        <div class="redeem-box">
                            <h3><i class="fas fa-lock"></i> 付费内容</h3>
                            <input type="text" id="redeemCode" class="redeem-input" placeholder="输入16位兑换码">
                            <button id="redeemBtn" class="redeem-btn">验证兑换码</button>
                            <div id="redeemResult" class="redeem-result"></div>
                        </div>
                    `;
                } else {
                    // 免费或已解锁 -> 显示下载按钮
                    const downloadUrl = fileMeta.downloadUrl || '#';
                    html += `<button class="download-btn" id="downloadBtn" data-url="${downloadUrl}"><i class="fas fa-download"></i> 下载文件</button>`;
                    if (fileMeta.password) {
                        html += `<p><i class="fas fa-key"></i> 解压密码: <code>${escapeHtml(fileMeta.password)}</code></p>`;
                    }
                }

                // 如果存在详细说明内容，则渲染
                if (fileMeta.content) {
                    html += `<hr><div class="article-content">${marked.parse(fileMeta.content)}</div>`;
                }
                html += '</div>';
                modalBody.innerHTML = html;

                // 绑定兑换码验证事件
                if (isPaid && !isUnlocked) {
                    document.getElementById('redeemBtn').addEventListener('click', () => {
                        const code = document.getElementById('redeemCode').value.trim();
                        verifyRedeemCode(code, resourceKey, fileMeta);
                    });
                } else {
                    // 绑定下载按钮事件（通过创建临时 <a> 标签触发下载，不暴露 URL 文本）
                    const btn = document.getElementById('downloadBtn');
                    if (btn) {
                        btn.addEventListener('click', () => {
                            const url = btn.dataset.url;
                            if (url && url !== '#') {
                                const a = document.createElement('a');
                                a.href = url;
                                a.download = ''; // 让浏览器决定文件名
                                a.click();
                            }
                        });
                    }
                }
                hljs.highlightAll(); // 高亮代码块
            } catch (e) {
                modalBody.innerHTML = `<div class="error-state">加载失败</div>`;
            }
        }

        /**
         * 渲染文章类型资源的详情
         * 如果有 contentRef，会加载对应的文章文件
         * @param {object} resource - 资源对象
         */
        async function renderArticleDetail(resource) {
            try {
                let article = resource;
                if (resource.contentRef && !resource._fullDetail) {
                    const res = await fetch(resource.contentRef);
                    const text = await res.text();
                    const parsed = parseFrontMatter(text);
                    article = { ...resource, ...parsed.meta, content: parsed.content };
                }
                modalBody.innerHTML = `
                    <div class="article-content">
                        <h1>${escapeHtml(article.title)}</h1>
                        <p><i class="fas fa-user"></i> ${escapeHtml(article.author || '鸿渚')} | <i class="fas fa-calendar"></i> ${article.date || ''}</p>
                        ${marked.parse(article.content || '')}
                    </div>
                `;
                hljs.highlightAll();
            } catch (e) {
                modalBody.innerHTML = `<div class="error-state">加载失败</div>`;
            }
        }

        /**
         * 渲染其他类型资源（网页/软件）的默认详情
         * 通常只显示标题、描述和访问链接
         * @param {object} resource - 资源对象
         */
        function renderDefaultDetail(resource) {
            modalBody.innerHTML = `
                <div style="text-align:center; padding:2rem">
                    <h2>${escapeHtml(resource.title)}</h2>
                    <p>${escapeHtml(resource.description || '')}</p>
                    ${resource.url ? `<a href="${resource.url}" target="_blank" class="download-btn">访问链接</a>` : ''}
                </div>
            `;
        }

        // ==================== 兑换码验证 ====================

        /**
         * 调用云函数验证兑换码
         * @param {string} code - 用户输入的兑换码
         * @param {string} resourceKey - 资源唯一标识（用于云函数识别）
         * @param {object} fileMeta - 文件元数据，用于验证成功后重新渲染详情
         */
        async function verifyRedeemCode(code, resourceKey, fileMeta) {
            const btn = document.getElementById('redeemBtn');
            const resultDiv = document.getElementById('redeemResult');
            if (!code) { resultDiv.innerHTML = '请输入兑换码'; resultDiv.className = 'redeem-result redeem-error'; return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 验证中...';
            resultDiv.innerHTML = '';

            try {
                const res = await fetch(CONFIG.verifyApiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, resourceId: resourceKey })
                });
                const data = await res.json();
                if (data.success) {
                    // 解锁成功，将资源加入已解锁集合
                    unlockedResources.add(resourceKey);
                    resultDiv.innerHTML = '✅ 验证成功！正在刷新...';
                    resultDiv.className = 'redeem-result redeem-success';
                    // 延迟后重新渲染详情（显示下载按钮）
                    setTimeout(() => renderFileDetail(fileMeta), 1500);
                } else {
                    resultDiv.innerHTML = `❌ ${data.message || '验证失败'}`;
                    resultDiv.className = 'redeem-result redeem-error';
                    btn.disabled = false;
                    btn.innerHTML = '验证兑换码';
                }
            } catch (err) {
                resultDiv.innerHTML = '❌ 网络错误，请重试';
                resultDiv.className = 'redeem-result redeem-error';
                btn.disabled = false;
                btn.innerHTML = '验证兑换码';
            }
        }

        /**
         * 根据文件扩展名返回对应的 Font Awesome 图标类名
         * @param {string} type - 文件类型扩展名（如 zip, pdf 等）
         * @returns {string} 图标类名
         */
        function getFileIcon(type) {
            const map = { zip:'file-archive', rar:'file-archive', pdf:'file-pdf', doc:'file-word', xls:'file-excel', jpg:'file-image', png:'file-image', mp4:'file-video', mp3:'file-audio' };
            return map[type] || 'file';
        }
    </script>
</body>
</html>
